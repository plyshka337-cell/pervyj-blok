<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — Первый Блок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }
        :root {
            --accent: #0091FF;
            --accent-hover: #0077dd;
            --yellow: #FFB700;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }

        /* HEADER */
        .header {
            background: #fff; padding: 16px 0;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            position: sticky; top: 0; z-index: 100;
        }
        .header__inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .logo { text-decoration: none; color: #1a1a1a; display: flex; flex-direction: column; }
        .logo__main { font-size: 1.5rem; font-weight: 900; }
        .logo__accent { color: var(--accent); }
        .logo__sub { font-size: 9px; letter-spacing: 2px; color: #6b7280; text-transform: uppercase; }
        .header__phone { font-size: 1rem; font-weight: 700; color: #1a1a1a; text-decoration: none; }
        .header__phone:hover { color: var(--accent); }
        .btn-back {
            background: var(--accent); color: #fff;
            padding: 10px 18px; border-radius: 6px;
            font-weight: 700; font-size: 0.85rem; text-decoration: none;
            transition: 0.2s;
        }
        .btn-back:hover { background: var(--accent-hover); }

        /* LAYOUT */
        .catalog { padding: 40px 0 60px; }
        .section-title { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .section-subtitle { text-align: center; color: #6b7280; margin-bottom: 2rem; font-size: 0.95rem; }
        .catalog__layout { display: grid; grid-template-columns: 240px 1fr; gap: 2rem; align-items: start; }

        /* SIDEBAR */
        .sidebar { display: flex; flex-direction: column; gap: 0.5rem; position: sticky; top: 100px; }
        .sidebar__btn {
            text-align: left; padding: 12px 16px;
            border: 1px solid #e5e7eb; border-radius: 10px;
            background: #fff; color: #4b5563;
            font-weight: 500; font-size: 0.85rem; cursor: pointer;
            font-family: 'Montserrat', sans-serif; transition: 0.2s;
        }
        .sidebar__btn:hover { border-color: var(--accent); color: var(--accent); }
        .sidebar__btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

        /* GRID */
        .catalog__grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; }

        /* PRODUCT CARD */
        .product-card {
            background: #fff; border-radius: 16px;
            padding: 0 1.3rem 1.5rem;
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 16px 35px rgba(0,0,0,0.1); }
        .product-card--porevit { border-top: 4px solid #d1d5db; }
        .product-card--porablok { border-top: 4px solid var(--accent); }
        .product-card--insi { border-top: 4px solid #dc2626; }

        .product-card__image {
            height: 150px; margin: 0 -1.3rem 1rem;
            display: flex; align-items: center; justify-content: center;
            border-radius: 16px 16px 0 0; overflow: hidden;
            background: #f9fafb;
        }
        .product-card__image-icon { font-size: 3.5rem; opacity: 0.4; transition: 0.3s; }
        .product-card:hover .product-card__image-icon { transform: scale(1.1); opacity: 0.7; }

        .product-card__badge {
            display: inline-block; align-self: flex-start;
            background: #eff6ff; color: var(--accent);
            font-weight: 700; font-size: 0.65rem;
            padding: 3px 10px; border-radius: 20px;
            margin-bottom: 0.5rem;
        }
        .product-card__title { font-weight: 700; font-size: 1rem; margin-bottom: 0.1rem; }
        .product-card__location { color: #9ca3af; font-size: 0.75rem; margin-bottom: 0.8rem; }
        .product-card__specs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; margin-bottom: 1rem; font-size: 0.78rem; }
        .product-card__spec {
            background: #f9fafb; padding: 0.35rem 0.5rem; border-radius: 6px;
            display: flex; flex-direction: column;
        }
        .product-card__spec-label { font-size: 0.6rem; color: #9ca3af; text-transform: uppercase; }
        .product-card__spec-value { font-weight: 700; }
        .product-card__price-row { display: flex; align-items: flex-end; justify-content: space-between; margin-top: auto; gap: 0.5rem; }
        .product-card__price { font-weight: 800; font-size: 1.2rem; }
        .product-card__price-m3 { font-size: 0.7rem; color: #6b7280; }
        .btn-cart {
            background: var(--accent); color: #fff; border: none;
            font-weight: 700; padding: 0.5rem 1rem; border-radius: 6px;
            font-size: 0.78rem; cursor: pointer;
            font-family: 'Montserrat', sans-serif; transition: 0.2s;
        }
        .btn-cart:hover { background: var(--accent-hover); }
        .btn-cart:active { transform: scale(0.95); }
        .empty-msg { text-align: center; color: #9ca3af; grid-column: 1/-1; padding: 3rem; }

        /* FOOTER */
        .footer { background: #0f172a; color: #9ca3af; padding: 2rem 0; text-align: center; font-size: 0.8rem; }
        .footer a { color: #d1d5db; }

        @media (max-width: 768px) {
            .catalog__layout { grid-template-columns: 1fr; }
            .sidebar { position: static; flex-direction: row; flex-wrap: wrap; }
            .sidebar__btn { font-size: 0.75rem; padding: 8px 10px; }
            .catalog__grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .catalog__grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">
                <span class="logo__main">ПЕРВЫЙ<span class="logo__accent">БЛОК</span></span>
                <span class="logo__sub">Официальный дилер заводов</span>
            </a>
            <a href="tel:+79935455125" class="header__phone">+7 993 545-51-25</a>
            <a href="index.html" class="btn-back">← На главную</a>
        </div>
    </header>

    <!-- CATALOG -->
    <section class="catalog">
        <div class="container">
            <h1 class="section-title">Каталог стройматериалов</h1>
            <p class="section-subtitle">Выберите категорию слева — товары справа</p>
            <div class="catalog__layout">
                <aside class="sidebar" id="sidebar"></aside>
                <div class="catalog__grid" id="catalogGrid"></div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p><a href="index.html">Первый Блок</a> — официальный дилер заводов. Строим будущее.</p>
        </div>
    </footer>

    <script>
        const categories = [
            { id: 'gazobeton', icon: '🧱', title: 'Газобетонные блоки' },
            { id: 'kirpich-ryad', icon: '🧱', title: 'Кирпич рядовой' },
            { id: 'kirpich-lic', icon: '🧱', title: 'Кирпич лицевой' },
            { id: 'peremichki', icon: '🏗️', title: 'Перемычки' },
            { id: 'krovlya', icon: '🏠', title: 'Кровля' },
            { id: 'plitka', icon: '🧱', title: 'Тротуарная плитка' },
            { id: 'cement', icon: '🪨', title: 'Цемент' },
            { id: 'smesi', icon: '🎨', title: 'Смеси для фасадов' },
        ];
        const products = [
            { cat: 'gazobeton', factory: 'porevit', name: 'Поревит', location: 'Тюмень', density: 'D500', size: '625×100×250', volume: '0,0156 м³', price: '68 ₽', priceM3: '4 300 ₽/м³' },
            { cat: 'gazobeton', factory: 'porevit', name: 'Поревит', location: 'Тюмень', density: 'D500', size: '625×150×250', volume: '0,0234 м³', price: '101 ₽', priceM3: '4 300 ₽/м³' },
            { cat: 'gazobeton', factory: 'porevit', name: 'Поревит', location: 'Тюмень', density: 'D500', size: '625×200×250', volume: '0,0313 м³', price: '135 ₽', priceM3: '4 300 ₽/м³' },
            { cat: 'gazobeton', factory: 'porevit', name: 'Поревит', location: 'Тюмень', density: 'D500', size: '625×250×250', volume: '0,0391 м³', price: '168 ₽', priceM3: '4 300 ₽/м³' },
            { cat: 'gazobeton', factory: 'porevit', name: 'Поревит', location: 'Тюмень', density: 'D500', size: '625×300×250', volume: '0,0469 м³', price: '202 ₽', priceM3: '4 300 ₽/м³' },
            { cat: 'gazobeton', factory: 'porevit', name: 'Поревит', location: 'Тюмень', density: 'D500', size: '625×400×250', volume: '0,0625 м³', price: '269 ₽', priceM3: '4 300 ₽/м³' },
            { cat: 'gazobeton', factory: 'porablok', name: 'Пораблок', location: 'Курган', density: 'D500', size: '625×100×250', volume: '0,0156 м³', price: '60 ₽', priceM3: '3 850 ₽/м³' },
            { cat: 'gazobeton', factory: 'porablok', name: 'Пораблок', location: 'Курган', density: 'D500', size: '625×150×250', volume: '0,0234 м³', price: '90 ₽', priceM3: '3 850 ₽/м³' },
            { cat: 'gazobeton', factory: 'porablok', name: 'Пораблок', location: 'Курган', density: 'D500', size: '625×200×250', volume: '0,0313 м³', price: '120 ₽', priceM3: '3 850 ₽/м³' },
            { cat: 'gazobeton', factory: 'porablok', name: 'Пораблок', location: 'Курган', density: 'D500', size: '625×250×250', volume: '0,0391 м³', price: '151 ₽', priceM3: '3 850 ₽/м³' },
            { cat: 'gazobeton', factory: 'porablok', name: 'Пораблок', location: 'Курган', density: 'D500', size: '625×300×250', volume: '0,0469 м³', price: '181 ₽', priceM3: '3 850 ₽/м³' },
            { cat: 'gazobeton', factory: 'porablok', name: 'Пораблок', location: 'Курган', density: 'D500', size: '625×400×250', volume: '0,0625 м³', price: '241 ₽', priceM3: '3 850 ₽/м³' },
            { cat: 'gazobeton', factory: 'insi', name: 'Инси', location: 'Зауральск', density: 'D500', size: '625×100×250', volume: '0,0156 м³', price: '71 ₽', priceM3: '4 500 ₽/м³' },
            { cat: 'gazobeton', factory: 'insi', name: 'Инси', location: 'Зауральск', density: 'D500', size: '625×200×250', volume: '0,0313 м³', price: '141 ₽', priceM3: '4 500 ₽/м³' },
            { cat: 'gazobeton', factory: 'insi', name: 'Инси', location: 'Зауральск', density: 'D500', size: '625×300×250', volume: '0,0469 м³', price: '211 ₽', priceM3: '4 500 ₽/м³' },
            { cat: 'gazobeton', factory: 'insi', name: 'Инси', location: 'Зауральск', density: 'D500', size: '625×400×250', volume: '0,0625 м³', price: '281 ₽', priceM3: '4 500 ₽/м³' },
            { cat: 'kirpich-ryad', factory: 'kirpich', name: 'Кирпич рядовой', location: 'М-150', density: '', size: '250×120×65', volume: '', price: '18 ₽', priceM3: '' },
            { cat: 'kirpich-lic', factory: 'kirpich', name: 'Кирпич лицевой', location: 'Красный', density: '', size: '250×120×65', volume: '', price: '25 ₽', priceM3: '' },
            { cat: 'cement', factory: 'cement', name: 'Цемент ПЦ-500', location: 'М-500', density: '', size: '50 кг', volume: '', price: '420 ₽', priceM3: '' },
        ];

        const sidebar = document.getElementById('sidebar');
        const grid = document.getElementById('catalogGrid');

        const allBtn = document.createElement('button');
        allBtn.className = 'sidebar__btn'; allBtn.textContent = 'Все товары'; allBtn.dataset.cat = 'all';
        sidebar.appendChild(allBtn);
        categories.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'sidebar__btn';
            btn.textContent = `${c.icon} ${c.title}`;
            btn.dataset.cat = c.id;
            sidebar.appendChild(btn);
        });

        function renderProducts(filter = 'all', factoryFilter = 'all') {
            grid.innerHTML = '';
            let filtered = products;
            if (filter !== 'all') filtered = filtered.filter(p => p.cat === filter);
            if (factoryFilter !== 'all') filtered = filtered.filter(p => p.factory === factoryFilter);
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-msg">Товары скоро появятся</div>';
                return;
            }
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = `product-card product-card--${p.factory}`;
                card.innerHTML = `
                    <div class="product-card__image"><span class="product-card__image-icon">🧱</span></div>
                    ${p.density ? `<span class="product-card__badge">${p.density}</span>` : ''}
                    <div class="product-card__title">${p.name}</div>
                    <div class="product-card__location">${p.location}</div>
                    <div class="product-card__specs">
                        <div class="product-card__spec"><span class="product-card__spec-label">Размер</span><span class="product-card__spec-value">${p.size}</span></div>
                        <div class="product-card__spec"><span class="product-card__spec-label">Объём</span><span class="product-card__spec-value">${p.volume || '—'}</span></div>
                    </div>
                    <div class="product-card__price-row">
                        <div><div class="product-card__price">${p.price}</div>${p.priceM3 ? `<div class="product-card__price-m3">${p.priceM3}</div>` : ''}</div>
                        <button class="btn-cart">В корзину</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        sidebar.addEventListener('click', (e) => {
            if (e.target.classList.contains('sidebar__btn')) {
                document.querySelectorAll('.sidebar__btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderProducts(e.target.dataset.cat);
            }
        });

        const params = new URLSearchParams(window.location.search);
        const catParam = params.get('cat');
        const factoryParam = params.get('factory');
        if (catParam) {
            const btn = document.querySelector(`.sidebar__btn[data-cat="${catParam}"]`);
            if (btn) { btn.classList.add('active'); renderProducts(catParam, factoryParam || 'all'); }
            else { allBtn.classList.add('active'); renderProducts('all'); }
        } else if (factoryParam) {
            allBtn.classList.add('active'); renderProducts('all', factoryParam);
        } else {
            allBtn.classList.add('active'); renderProducts('all');
        }

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-cart') && e.target.textContent === 'В корзину') {
                e.target.textContent = '✓ Добавлено';
                e.target.style.background = '#16a34a';
                setTimeout(() => { e.target.textContent = 'В корзину'; e.target.style.background = ''; }, 800);
            }
        });
    </script>
</body>
</html>
